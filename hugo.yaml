baseURL: https://gowrapavan.github.io

languageCode: en-us
title: "GOWRA PAVAN"

# Use Hugo modules to add theme

module:
  imports:
  - path: github.com/hugo-toha/toha/v4
  mounts:
  - source: static/files
    target: static/files
  - source: ./node_modules/flag-icon-css/flags
    target: static/flags
  - source: ./node_modules/@fontsource/mulish/files
    target: static/files
  - source: ./node_modules/katex/dist/fonts
    target: static/fonts

# Manage languages
# For any more details, you can check the official documentation: https://gohugo.io/content-management/multilingual/
languages:
  en:
    languageName: English
    weight: 1
  fr:
    languageName: Français
    weight: 2

# Force a locale to be use, really useful to develop the application ! Should be commented in production, the "weight" should rocks.
# DefaultContentLanguage: bn

# Allow raw html in markdown file
markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 6
    ordered: false

# At least HTML and JSON are required for the main HTML content and
# client-side JavaScript search
outputs:
  home:
    - HTML
    - RSS
    - JSON

# Enable global emoji support
enableEmoji: true

# Site parameters
params:
  # GitHub repo URL of your site
  gitRepo: https://github.com/gowrapavan/blog


   # The inverted logo will be used in the initial transparent navbar and
 # the main logo will be used in the non-transparent navbar.
logo:
    main: images/logo.png
    inverted: images/logo.png
    favicon: images/logo.png
 
  # Enable and configure blog posts
blog:
  enable: true
  showAuthor: true # shows the post author (defaults true)



  features:
    # Enable portfolio section
    portfolio:
      enable: true

    # Enable blog posts
    blog:
      enable: true

    # Enable Table of contents in reading page
    toc:
      enable: true

  # Configure footer
  footer:
    enable: true

author:
  name: Gowra Pavan Kumar
  image: /images/authors/habib.jpg
  title: "Creating Category"
  date: 2020-06-08T06:15:55+06:00
  # hero: images/background/flower.jpg
  author:
    name: Gowra Pavan Kumar
    image: /images/authors/habib.jpg
